name: Build Release

# Builds PyInstaller bundles for Windows, macOS, and Linux whenever a
# version tag (v*) is pushed, and attaches the artifacts to a GitHub
# Release. Can also be run manually via workflow_dispatch for test builds.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec: packaging/pyinstaller/linux.spec
            artifact_name: pixelpal-linux
            dist_path: dist/pixelpal
          - os: windows-latest
            spec: packaging/pyinstaller/windows.spec
            artifact_name: pixelpal-windows
            dist_path: dist/pixelpal
          - os: macos-latest
            spec: packaging/pyinstaller/macos.spec
            artifact_name: pixelpal-macos
            dist_path: dist/PixelPal.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Qt runtime libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libdbus-1-3

      - name: Install PixelPal + PyInstaller
        run: pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }}

      - name: Package artifact (zip)
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            zip -r "../${{ matrix.artifact_name }}.zip" "PixelPal.app"
          else
            zip -r "../${{ matrix.artifact_name }}.zip" "pixelpal"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
